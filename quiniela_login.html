<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Osone Go - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .contenedor-auth { max-width: 400px; margin: 8vh auto; padding: 20px; }
        .brand-text { color: #00d2ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container contenedor-auth">
    <div class="text-center mb-4">
        <h2 class="brand-text">⚽ Quiniela Osone Go</h2>
        <p class="text-muted">Demuestra qué tanto sabes de la liga</p>
    </div>

    <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="tab-login" data-bs-toggle="pill" data-bs-target="#panel-login" type="button">Iniciar Sesión</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab-registro" data-bs-toggle="pill" data-bs-target="#panel-registro" type="button">Registrarse</button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="panel-login">
            <div class="card shadow">
                <div class="card-body">
                    <form id="form-login">
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" name="correo" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Entrar a la Quiniela</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="panel-registro">
            <div class="card shadow">
                <div class="card-body">
                    <form id="form-registro">
                        <div class="mb-3">
                            <label class="form-label">Nombre o Apodo</label>
                            <input type="text" name="nombre" class="form-control" placeholder="Ej. El Profe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" name="correo" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Crear mi Cuenta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'https://tu-proyecto-backend.onrender.com';

    // Manejo del Registro
    document.getElementById('form-registro').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        try {
            const res = await fetch(`${API_URL}/registro_quiniela`, { method: 'POST', body: formData });
            const data = await res.json();
            
            if (res.ok) {
                alert('¡Tu cuenta ha sido creada! Ahora puedes iniciar sesión.');
                e.target.reset();
                document.getElementById('tab-login').click(); // Cambia a la pestaña de login
            } else {
                alert('Error: ' + data.detail);
            }
        } catch (error) { alert('Error de conexión con el servidor.'); }
    });

    // Manejo del Login
    document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        try {
            const res = await fetch(`${API_URL}/login_quiniela`, { method: 'POST', body: formData });
            const data = await res.json();
            
            if (res.ok) {
                // Guardamos los datos del usuario en el navegador temporalmente
                sessionStorage.setItem('quiniela_usuario', JSON.stringify(data.usuario));
                alert(`¡Bienvenido ${data.usuario.nombre_completo}!`);
                // Redirigir al panel de la jornada (lo crearemos en el siguiente paso)
                window.location.href = 'quiniela_jornada.html'; 
            } else {
                alert('Credenciales incorrectas.');
            }
        } catch (error) { alert('Error de conexión con el servidor.'); }
    });
</script>
</body>
</html>
