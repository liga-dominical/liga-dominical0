<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Quiniela - Osone Go</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .brand-text { color: #00d2ff; }
        .podium-1 { background-color: rgba(255, 215, 0, 0.15); border-left: 4px solid gold; } /* Oro */
        .podium-2 { background-color: rgba(192, 192, 192, 0.15); border-left: 4px solid silver; } /* Plata */
        .podium-3 { background-color: rgba(205, 127, 50, 0.15); border-left: 4px solid #cd7f32; } /* Bronce */
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand mb-0 h1 brand-text">⚽ Quiniela Osone Go</span>
        <div class="text-end">
            <a href="quiniela_jornada.html" class="btn btn-sm btn-outline-info me-2">Volver a Partidos</a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="text-center mb-4">
        <h3>🏆 Tabla General de Posiciones</h3>
        <p class="text-muted">Los mejores pronosticadores de la liga</p>
    </div>

    <div class="card shadow" style="background-color: #1e1e1e; border: 1px solid #333;">
        <div class="card-body p-0">
            <table class="table table-dark table-hover mb-0">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 15%;">Pos</th>
                        <th>Participante</th>
                        <th class="text-center" style="width: 25%;">Puntos</th>
                    </tr>
                </thead>
                <tbody id="tabla-ranking">
                    <tr><td colspan="3" class="text-center text-muted py-4">Cargando posiciones...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'https://tu-proyecto-backend.onrender.com';

    async function cargarRanking() {
        try {
            const res = await fetch(`${API_URL}/ranking_quiniela`).then(r => r.json());
            const tbody = document.getElementById('tabla-ranking');
            
            if (res.ranking.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-4">Aún no hay puntos registrados.</td></tr>';
                return;
            }

            tbody.innerHTML = res.ranking.map((usuario, index) => {
                const posicion = index + 1;
                let claseFila = '';
                let medalla = '';

                // Asignar colores a los 3 primeros lugares
                if (posicion === 1) { claseFila = 'podium-1'; medalla = '🥇'; }
                else if (posicion === 2) { claseFila = 'podium-2'; medalla = '🥈'; }
                else if (posicion === 3) { claseFila = 'podium-3'; medalla = '🥉'; }

                return `
                <tr class="${claseFila}">
                    <td class="text-center fw-bold align-middle">${posicion} ${medalla}</td>
                    <td class="align-middle fw-semibold">${usuario.nombre_completo}</td>
                    <td class="text-center align-middle"><span class="badge bg-primary fs-6">${usuario.puntos_totales} Pts</span></td>
                </tr>
                `;
            }).join('');
        } catch (error) {
            document.getElementById('tabla-ranking').innerHTML = '<tr><td colspan="3" class="text-center text-danger py-4">Error al cargar el ranking.</td></tr>';
        }
    }

    // Cargar el ranking automáticamente al abrir la pantalla
    cargarRanking();
</script>
</body>
</html>
