<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador - Osone Go</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 400px; width: 100%; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="card login-card shadow-lg border-0 p-4 bg-white">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">⚽ Osone Go</h2>
            <p class="text-muted">Panel de Administración</p>
        </div>

        <form id="form-login">
            <div class="mb-3">
                <label class="form-label fw-bold">Usuario</label>
                <input type="text" name="usuario" class="form-control form-control-lg" required placeholder="Ingresa tu usuario">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Contraseña</label>
                <input type="password" name="password" class="form-control form-control-lg" required placeholder="••••••••">
            </div>
            
            <div id="error-msg" class="alert alert-danger d-none text-center py-2"></div>

            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Entrar al Sistema</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="index.html" class="text-decoration-none text-secondary"><small>← Regresar al sitio público</small></a>
        </div>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const response = await fetch('https://backend-liga-tm8f.onrender.com/login', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // ¡Login Exitoso! Guardamos el pase de entrada en el navegador
                    sessionStorage.setItem('admin_auth', 'concedido');
                    // Redirigimos al panel de administrador
                    window.location.href = 'admin_partidos.html';
                } else {
                    // Contraseña incorrecta
                    errorMsg.classList.remove('d-none');
                    errorMsg.innerText = '❌ Credenciales incorrectas';
                }
            } catch (error) {
                errorMsg.classList.remove('d-none');
                errorMsg.innerText = '⚠️ Error de conexión con el servidor';
            }
        });
    </script>
</body>
</html>
